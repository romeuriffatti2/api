spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/app_db}
    username: ${DB_USER:admin}
    password: ${DB_PASS:admin123}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${DDL_AUTO:create}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET:defaultSecretKeyForDevelopmentPurposesOnly123456}
    expiration-ms: ${JWT_EXPIRATION:86400000}
  upload:
    dir: ${UPLOAD_DIR:uploads}
  certificate:
    storage:
      path: ${CERT_STORAGE_PATH:uploads/certificates/}

server:
  port: ${SERVER_PORT:8080}

admin:
  seed:
    email: ${ADMIN_EMAIL:admin@admin.com}
    password: ${ADMIN_PASSWORD:Admin@1234}
    name: ${ADMIN_NAME:Administrador}
  
cors:
  allowed-origins: http://localhost:4200
